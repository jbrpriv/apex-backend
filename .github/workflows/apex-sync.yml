# .github/workflows/apex-sync.yml
name: Apex Sync

on:
  schedule:
    - cron: "0 * * * *"   # every hour UTC
  workflow_dispatch:       # manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Start Apex Sync
        run: echo "📌 Starting Apex sync at $(date -u)"

      - name: Call Vercel Sync Endpoint
        env:
          SYNC_KEY: ${{ secrets.SYNC_KEY }}
        run: |
          echo "⏳ Calling /api/accounts/sync endpoint..."
          RESPONSE=$(curl -s -X POST "https://apex-backend-seven.vercel.app/api/sync" \
            -H "Content-Type: application/json" \
            -H "x-sync-key: $SYNC_KEY")
          echo "💻 Response from server:"
          echo "$RESPONSE"

      - name: Finish Apex Sync
        run: echo "✅ Apex sync finished at $(date -u)"